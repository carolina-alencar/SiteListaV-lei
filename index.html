<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏐 Lista de Vôlei Misto 20h30</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 🔥 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- (Opcional, se for usar login futuramente) -->
    <!-- <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> -->
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="ball-icon">
                    <i class="fas fa-volleyball-ball"></i>
                </div>
                <h1>Lista de Vôlei</h1>
                <p class="subtitle">Inscreva-se para jogar!</p>
            </div>

            <div class="status-horario" id="statusHorario">
                <div class="status-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <div class="status-info">
                    <span class="status-text">Inscrições fechadas</span>
                    <span class="status-detail">Abrem às 08:00</span>
                </div>
            </div>

            <div class="relogio" id="relogio">
                <i class="fas fa-clock"></i>
                <span id="horaAtual">--:--:--</span>
            </div>
        </header>

        <!-- Formulário -->
        <section class="form-section" id="formSection">
            <div class="form-card">
                <h2><i class="fas fa-user-plus"></i> Inscrição</h2>
                <form id="formInscricao" autocomplete="off">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="nomeJogador" 
                            placeholder="Digite seu nome completo" 
                            required
                            maxlength="50"
                        >
                        <button type="submit" id="btnInscrever">
                            <i class="fas fa-plus-circle"></i>
                            <span>Entrar na Lista</span>
                        </button>
                    </div>
                    <div id="mensagem" class="mensagem"></div>
                </form>
            </div>
        </section>

        <!-- Lista -->
        <section class="lists-section">
            <div class="list-card">
                <div class="list-header confirmados-header">
                    <h2>
                        <i class="fas fa-check-circle"></i> 
                        Confirmados 
                        <span class="badge" id="badgeConfirmados">0/28</span>
                    </h2>
                </div>
                <div class="list-body" id="listaConfirmados"></div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>🏐 Sistema de Lista de Vôlei &copy; 2024</p>
        </footer>
    </div>

    <!-- 🔥 Inicialização do Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBXSZtVrG4l5nY7MIMc3Jnesxl7QUn4og4",
            authDomain: "lista-de-volei-20h30.firebaseapp.com",
            projectId: "lista-de-volei-20h30",
            storageBucket: "lista-de-volei-20h30.firebasestorage.app",
            messagingSenderId: "885404065182",
            appId: "1:885404065182:web:7775b650a052b74e3fca8f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <script src="script.js"></script>
</body>
</html>
